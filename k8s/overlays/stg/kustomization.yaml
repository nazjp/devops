apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: stg-

replicas:
  - name: app
    count: 1

images:
  - name: ghcr.io/example/app
    newTag: stg

patches:
  - target:
      kind: Ingress
      name: app
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: stg.app.example.com
